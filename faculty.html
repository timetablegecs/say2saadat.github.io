  <style>
/* =====================
   GLOBAL RESET
===================== */
* {
  box-sizing: border-box;
}

/* =====================
   PAGE BACKGROUND & LAYOUT
===================== */
body {
  margin: 0;
  font-family: Georgia, Arial, Helvetica, 'Times New Roman', Times, serif;
  background: linear-gradient(120deg, #4facfe, #00f2fe);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px;
}

/* =====================
   MAIN CARD CONTAINER
===================== */
.card {
  background: #ffffff;
  width: 100%;
  max-width: 800px;
  padding: 80px 40px;
  border-radius: 12px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
  transition: 0.1s;
}
.card.big {
  max-width: 1100px;   /* bigger after table shows */
}
/* =====================
   PAGE HEADING
===================== */
h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
  font-size: 22px;
}

/* =====================
   INPUT & BUTTON GROUP
===================== */
.input-group {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  width: 100%;
}

/* Employee ID input box */
input {
  padding: 10px;
  font-size: 14px;
  font-family: Arial,'Times New Roman', Times, serif;
  border-radius: 6px;
  border: 1px solid #0b5592;
  max-width: 150px;
  width: 50%;
}

/* View Timetable & Download buttons */
button {
  padding: 10px 20px;
  font-size: 14px;
  border: none;
  border-radius: 6px;
  background: #05457e;
  color: #fff;
  cursor: pointer;
  width: 100%;
  max-width: 150px;
}

button:hover {
  background: #065396;
}

/* =====================
   TABLE WRAPPER
===================== */
.table-wrapper {
  width: 100%;
  margin-top: 15px;
  overflow-x: hidden; /* desktop */
}

/* =====================
   TABLE STRUCTURE
===================== */
table {
  border-collapse: collapse;
  width: 100%;
  background: white;
  table-layout: fixed;
}

/* =====================
   TABLE CELL TEXT (MAIN CONTROL)
   👉 THIS CONTROLS TABLE DATA SIZE & COLOR
===================== */
th,
td {
  border: 1px solid rgb(182, 200, 207);
  padding: 12px;
  text-align: center;
  font-size: 13px;        /* ✅ table font size */
  color: #0b3c5d;         /* ✅ table text color */
  white-space: normal;
  word-break: break-word;
}

/* =====================
   TABLE HEADER ROW
===================== */
th {
  background: #0b3c5d;
  color: white;
  font-size: 12px;   /* ← ADD THIS LINE */
}

/* =====================
   FIRST COLUMN (DAY)
===================== */
td:first-child {
  background: #0b3c5d;
  color: white;
  font-weight: bold;
  position: sticky;
  left: 0;
  z-index: 1;
}

th:first-child {
  position: sticky;
  left: 0;
  z-index: 2;
  background: #0b3c5d;
  font-size: 12px;
  color: white;
}

/* Alternate row background */
tr:nth-child(even) {
  background: #fcfaf7;
}

/* =====================
   EMPLOYEE INFO TEXT
===================== */
.emp-text {
  font-weight: 700;
}

/* Employee name & department ONLY */
#empName,
#empDept {
  color: #186294;
  font-size: 15px;
}

/* Reduce spacing between name & department */
#empInfo p {
  margin: 3px 0;
  line-height: 1.2;
}

/* =====================
   FOOTER NOTE
===================== */
.note {
  text-align: center;
  margin-top: 12px;
  color: #0f477a;
  font-weight: bold;
  font-size: 10px;
}

/* =====================
   LOGO
===================== */
.logo-container {
  text-align: center;
  margin-bottom: 10px;
}

.college-logo {
  max-width: 120px;
  height: auto;
}

/* ------ marging for DownloadPDF button--- */
  #downloadSection {
    margin-top: 50px; 
  }

/* ===== ACTION BUTTONS FIX ===== */
#downloadSection {
  display: flex;
  justify-content: center;
  gap: 200px;               /* space between buttons (desktop) */
  flex-wrap: wrap;
}

.action-btn {
  background: #0b3c5d;
  color: white;
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  min-width: 100px;
}

.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:1000;
}

.popup-content{
  background:#fff;
  padding:16px;
  margin:0;
  width:320px;
  max-width:90%;
  border-radius:8px;
  text-align:left;
  position:absolute;
  top:25%;
  left:50%;
  transform:translateX(-50%);
}
.popup-content h3{
  margin-top:0;
  margin-bottom:8px;
  font-size:18px;
}

.popup-content p{
  margin:4px 0;
  font-size:14px;
}

.close-btn{
  float:right;
  cursor:pointer;
  font-size:22px;
}

.clickable{
  color:#0066cc;
  cursor:pointer;
  font-weight:600;
}
/* =====================
   MOBILE RESPONSIVE
===================== */
@media (max-width: 600px) {

  h2 {
    font-size: 16px;
  }

  .table-wrapper {
    overflow-x: auto;
  }

  table {
    min-width: 600px;
  }

  /* MOBILE: reduce row height */
  th, td {
    padding: 4px 6px;        /* 👈 reduces vertical gap */
    font-size: 11px;
    height: auto;            /* 👈 IMPORTANT */
    line-height: 1.4;
  }

  tbody tr {
    height: 35px;              /* 👈 THIS fixes Saturday */
  }

  /* MOBILE: Day column (first column) */
  td:first-child,
  th:first-child {
    min-width: 60px;
    white-space: nowrap;
    padding: 4px 6px;        /* 👈 match other cells */
  }

  .card {
    background: #ffffff;
    width: 95%;
    max-width: 600px;
    padding: 40px 10px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
  }

  select,
  input,
  button {
    max-width: 180px;
    width: 55%;
    margin: 1px auto;
    display: block;
    font-size: 12px;
    padding: 12px;
  }

  button {
    width: 55%;
  }
  .college-logo {
    max-width: 100px;
  }
}

</style>

const API_URL = "data/faculty_timetable.json";
const timeSlots = [
  "10:00-11:00AM",
  "11:00AM-12:00PM",
  "12:00PM-01:00PM",
  "Lunch",
  "02:00PM-03:00PM",
  "03:00PM-04:00PM",
  "04:00PM-05:00PM"
];

function formatCell(text) {

  if (!text) return "";

  let formatted = text;

  /* 1️⃣ Technical Assistant / Staff codes */
  Object.keys(facultyDetails).forEach(code => {

    let regex = new RegExp("(?<!\\w)" + code + "(?!\\w)", "g");

    formatted = formatted.replace(regex, function(match) {

      /* ignore faculty codes (3 uppercase letters) */
      if(/^[A-Z]{3}$/.test(code)) return match;

      return `<span style="color:green; cursor:pointer; font-weight:bold;"
              onclick="showFaculty('${code}')">${match}</span>`;
    });

  });

  /* 2️⃣ Subject codes */
  formatted = formatted.replace(
    /(?<!\w)[A-Z0-9]+-(L|P|T)(?!\w)/g,
    function(match) {
      return `<span style="color:blue; cursor:pointer; font-weight:bold;"
              onclick="showSubject('${match}')">${match}</span>`;
    }
  );

  return formatted;
}

function loadTimetable() {
  const empId = document.getElementById("empId").value.trim();
  const table = document.getElementById("table");
  const tbody = table.querySelector("tbody");

  if (!empId) {
    alert("Please enter Employee ID");
    return;
  }

  fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    const timetableData = data.filter(row =>
      String(row.EmployeeID) === empId
    );

    if (timetableData.length === 0) {
      alert("No timetable found");
      return;
    }

    document.getElementById("empName").textContent = timetableData[0].Name;
    document.getElementById("empDept").textContent = timetableData[0].Department;
      document.getElementById("empInfo").style.display = "block";
      document.getElementById("downloadSection").style.display = "block";

      tbody.innerHTML = "";

      table.style.display = "table";
      table.style.display = "table";

      timetableData.forEach(dayRow => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td><b>${dayRow["Day"]}</b></td>` +
          timeSlots.map(t => `<td>${formatCell(dayRow[t] || "")}</td>`).join("");
        tbody.appendChild(tr);
      });
      document.querySelector(".card").classList.add("big");
    })
    .catch(err => {
      alert("Error fetching data");
      console.error(err);
    });
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
function downloadPDF() {

  const card = document.querySelector('.card');
  const tableWrapper = document.querySelector('.table-wrapper');

  /* ---- TEMP FIX FOR MOBILE PDF ---- */
  tableWrapper.style.overflow = "visible";

  document.querySelectorAll("th, td").forEach(el => {
    el.style.position = "static";
  });

  const now = new Date();
  const dateTime =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();

  const footer = document.createElement("div");
  footer.style.textAlign = "center";
  footer.style.fontSize = "11px";
  footer.style.marginTop = "10px";
  footer.innerHTML = `Downloaded on: <b>${dateTime}</b>`;

  card.appendChild(footer);

  const opt = {
    margin: 0.3,
    filename: 'Timetable_' + now.getTime() + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: {
      scale: 2,
      scrollX: 0,
      scrollY: 0,
      useCORS: true
    },
    jsPDF: {
      unit: 'in',
      format: 'a4',
      orientation: 'landscape'
    }
  };

  html2pdf().set(opt).from(card).save().then(() => {

    /* ---- RESTORE UI AFTER DOWNLOAD ---- */
    tableWrapper.style.overflowX = "";

    document.querySelectorAll("th, td").forEach(el => {
      el.style.position = "";
    });

    footer.remove();
  });
}

function showFaculty(code) {

  let data = facultyDetails[code];
  if (!data) return;

  document.getElementById("popupDetails").innerHTML = `
    <p><b>Name:</b> ${data.name}</p>
    ${data.designation ? `<p><b>Designation:</b> ${data.designation}</p>` : ""}
    <p><b>Department:</b> ${data.department}</p>
  `;

  document.getElementById("popupBox").style.display = "block";
}

function showSubject(code) {

  let data = subjectDetails[code];

  if (!data) {
    document.getElementById("popupDetails").innerHTML = `
      <h3>Subject</h3>
      <p>Details not available</p>
    `;
  } else {

    let deptLine = data.department === "Common"
      ? ""
      : `<p><b>Department:</b> ${data.department}</p>`;

    document.getElementById("popupDetails").innerHTML = `
      <h3>Subject Details</h3>
      <p><b>Name:</b> ${data.name}</p>
      <p><b>Semester:</b> ${data.semester}</p>
      ${deptLine}
    `;
  }

  document.getElementById("popupBox").style.display = "block";
}

function closePopup(){
  document.getElementById("popupBox").style.display="none";
}

</script>
<div id="popupBox" class="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">×</span>
    <div id="popupDetails"></div>
  </div>
</div>
</body>
