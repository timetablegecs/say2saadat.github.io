  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, 'Times New Roman', Times, serif, Helvetica, sans-serif;
      background: linear-gradient(120deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 700px;
      padding: 80px 40px;
      border-radius: 12px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      }
    .card.big {
      max-width: 1200px;   /* bigger after table shows */
      }

    h2 {
      text-align: center;
      color: #0b3c5d;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .input-group {
      display: flex;
      font-family: Georgia, 'Times New Roman', Times, serif, Helvetica, sans-serif;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    select, button {
      padding: 8px;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid #0b5592;
      min-width: 140px;
      width: 100%;
      max-width: 100px;
    }

    button {
      background: #0b3c5d;
      color: white;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #06263d;
    }

    .table-wrapper {
      width: 100%;
      margin-top: 15px;
      overflow-x: hidden; /* desktop */
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      table-layout: fixed; /* fit table inside card */
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      color: #0b3c5d;
      font-size: 12px;
      white-space: normal;
      word-break: break-word;
    }

    table {
      table-layout: fixed;
    }
    th {
      background: #0b3c5d;
      color: white;
      font-size: 12px;
      position: sticky;
      top: 0;
    }

    td:first-child {
      background: #0b3c5d;
      color: white;
      font-weight: bold;
      font-size: 12px;
      position: sticky;
      left: 0;
      white-space: nowrap;
      text-align: center;
      z-index: 1;
    }

    th:first-child {
      height: 48px;
      font-size: 12px;
      color: white;
      font-weight: bold;
      position: sticky;
      left: 0;
      white-space: nowrap;
      width: auto;
      z-index: 2;
    }

    .message {
      text-align: center;
      margin-top: 12px;
      color: red;
      font-weight: bold;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 10px;
    }

    .college-logo {
      max-width: 120px;
      height: auto;
    }

    .note {
      text-align: center;
      margin-top: 12px;
      color: #0e4791;
      font-weight: bold;
      font-size: 11px;
    }
    /* ------ marging for DownloadPDF button--- */
    #downloadSection {
      margin-top: 30px; 
    }

    /* ===== ACTION BUTTONS FIX ===== */
    #downloadSection {
      display: flex;
      justify-content: center;
      gap: 50px;               /* space between buttons (desktop) */
      flex-wrap: wrap;
    }

    .action-btn {
      background: #0b3c5d;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      min-width: 100px;
    }

    #popupBox {
    width: 320px;
    max-width: 90%;
    text-align: left;
    }

    #popupBox h3 {
    margin-top: 0;
    font-size: 18px;
    }

    #popupBox p {
    margin: 6px 0;
    font-size: 14px;
    } 
    
    /* ===== Mobile specific tweaks ===== */
    @media (max-width: 600px) {
      h2 {
        font-size: 16px;
      }
      th, td {
        height: 35px;
        font-size: 11px;
      }
      td:first-child,
      th:first-child {
        min-width: 70px;
      }

      .table-wrapper {
        overflow-x: auto;
      }
      table {
        min-width: 600px;
      }

      .controls, 
      .form-group {
        display: flex;
        flex-direction: column;
        align-items: center;   /* 👈 centers everything */
      }

      .card {
        background: #ffffff;
        width: 95%;
        max-width: 600px;
        padding: 40px 10px;
        border-radius: 14px;
        text-align: center;
        box-shadow: 0 15px 30px rgba(0,0,0,0.25);
      }

      .input-group {
        flex-direction: column;
        align-items: center;
        max-width: 350px;
      }

      .college-logo {
        max-width: 100px;
      }

      select, input, button {
      width: 50%;
      max-width: 350px;
      margin: 2px auto;
      margin-right: auto;        /* 👈 centers horizontally */
      display: block;          /* 👈 REQUIRED */
      font-size: 12px;
      padding: 10px;
      
      }

      #downloadSection {
      display: flex;
      flex-direction: column;   /* stack vertically */
      align-items: center;      /* center horizontally */
      gap: 10px;                /* vertical spacing between buttons */
      width: 100%;
    }

    .action-btn {
      width: 100%;               /* centered, same size */
      max-width: 350px;
      padding: 14px;
    }

    #popupBox {
    width: 260px;
    padding: 14px;
    top: 30%;
  }

  #popupBox h3 {
    font-size: 16px;
  }

  #popupBox p {
    font-size: 13px;
  }
}
  </style>
</head>

function formatCell(text) {

  if (!text) return "";

  let formatted = text;

  // 1️⃣ Replace Faculty Codes (Exact Match Only)
  Object.keys(facultyDetails).forEach(code => {

    let regex = new RegExp("(?<!\\w)" + code + "(?!\\w)", "g");

    formatted = formatted.replace(regex, function(match) {
      return `<span style="color:green; cursor:pointer; font-weight:bold;"
                onclick="showFaculty('${code}')">${match}</span>`;
    });

  });

  // 2️⃣ Replace Subject Codes ONLY ending with -L / -P / -T
  formatted = formatted.replace(
    /(?<!\w)[A-Z0-9]+-(L|P|T)(?!\w)/g,
    function(match) {
      return `<span style="color:blue; cursor:pointer; font-weight:bold;"
                onclick="showSubject('${match}')">${match}</span>`;
    }
  );

  return formatted;
}

function showFaculty(code) {

  let data = facultyDetails[code];
  if (!data) return;

  // check if code is exactly 3 alphabets (faculty)
  let isFaculty = /^[A-Z]{3}$/.test(code);

  let heading = isFaculty ? "<h3>Faculty Details</h3>" : "";

  document.getElementById("popupContent").innerHTML = `
    ${heading}
    <p><b>Name:</b> ${data.name}</p>
    ${data.designation ? `<p><b>Designation:</b> ${data.designation}</p>` : ""}
    <p><b>Department:</b> ${data.department}</p>
  `;

  document.getElementById("popupBox").style.display = "block";
}
function showSubject(code) {

  let data = subjectDetails[code];

  if (!data) {
    document.getElementById("popupContent").innerHTML = `
      <h3>Subject</h3>
      <p>Details not available</p>
    `;
  } else {

    let deptLine = data.department === "Common"
      ? ""
      : `<p><b>Department:</b> ${data.department}</p>`;

    document.getElementById("popupContent").innerHTML = `
      <h3>Subject Details</h3>
      <p><b>Name:</b> ${data.name}</p>
      <p><b>Semester:</b> ${data.semester}</p>
      ${deptLine}
    `;
  }

  document.getElementById("popupBox").style.display = "block";
}

function closePopup() {
  document.getElementById("popupBox").style.display = "none";
}

const API = "data/student_timetable.json";

async function loadTimetable() {
  
  document.getElementById("classInfo").innerHTML = "";
  document.getElementById("classInfo").style.display = "none";
  document.getElementById("downloadSection").style.display = "none";
  document.getElementById("classInfo").innerHTML = "";
  
  const branch = document.getElementById("branch").value;
  const semester = document.getElementById("semester").value;

  document.getElementById("msg").innerText = "";
  document.getElementById("tableContainer").innerHTML = "";

  if (!branch || !semester) {
    document.getElementById("msg").innerText =
      "Please select both Branch and Semester";
    return;
  }

  const response = await fetch(API);
  const data = await response.json();

  const filtered = data.filter(
    row => row.Branch === branch && String(row.Semester) === semester
  );

  if (filtered.length === 0) {
    document.getElementById("classInfo").innerHTML = "";
    document.getElementById("msg").innerText =
      "No timetable found for selected Branch & Semester";
    return;
  }

  document.getElementById("downloadSection").style.display = "block";
  document.getElementById("classInfo").style.display = "block";
  document.getElementById("classInfo").innerHTML =
    `Branch: ${document.getElementById("branch").value}
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Semester: ${document.getElementById("semester").value}`;
  document.getElementById("classInfo").style.display = "block";

  renderTable(filtered);
}

function renderTable(rows) {
  let table = `
<table>
  <thead>
    <tr>
      <th>Day</th>
      <th>10:00 AM<br>11:00 AM</th>
      <th>11:00 AM<br>12:00 PM</th>
      <th>12:00 PM<br>01:00 PM</th>
      <th>Lunch<br>Break</th>
      <th>02:00 PM<br>03:00 PM</th>
      <th>03:00 PM<br>04:00 PM</th>
      <th>04:00 PM<br>05:00 PM</th>
    </tr>
  </thead>
  <tbody>
`;

  table += "</tr></thead><tbody>";

  rows.forEach(row => {
    table += "<tr>";
    Object.keys(row).forEach(key => {
      if (key !== "Branch" && key !== "Semester") {
        let cellData = row[key] || "";
        table += `<td>${formatCell(cellData)}</td>`;
      }
    });
    table += "</tr>";
  });

  table += "</tbody></table>";

  document.getElementById("tableContainer").innerHTML = table;
  document.querySelector(".card").classList.add("big");
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
function downloadPDF() {

  const card = document.querySelector('.card');
  const tableWrapper = document.querySelector('.table-wrapper');
  const downloadSection = document.getElementById("downloadSection");

  /* ---- TEMP FIX FOR PDF ---- */
  tableWrapper.style.overflow = "visible";

  document.querySelectorAll("th, td").forEach(el => {
    el.style.position = "static";
  });

  /* ---- REDUCE SIZE SLIGHTLY TO FIT ONE PAGE ---- */
  document.querySelectorAll("th, td").forEach(el => {
    el.style.fontSize = "10px";
    el.style.padding = "5px";
  });

  /* ---- HIDE BUTTONS IN PDF ---- */
  downloadSection.style.display = "none";

  const now = new Date();
  const dateTime =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();

  /* ---- CREATE TIMESTAMP ON NEW PAGE ---- */
  const footerPage = document.createElement("div");

  footerPage.style.pageBreakBefore = "always";
  footerPage.style.textAlign = "center";
  footerPage.style.fontSize = "14px";
  footerPage.style.paddingTop = "100px";

  footerPage.innerHTML = `
    <div style="
      border-top:1px solid #ccc;
      padding-top:20px;
      width:80%;
      margin:auto;
      color:#0b3c5d;
      font-family:Georgia;
    ">
      Downloaded on: <b>${dateTime}</b>
    </div>
  `;

  card.appendChild(footerPage);

  const opt = {
    margin: 0.2,
    filename: 'Timetable_' + now.getTime() + '.pdf',

    image: {
      type: 'jpeg',
      quality: 1
    },

    html2canvas: {
      scale: 2,
      scrollX: 0,
      scrollY: 0,
      useCORS: true
    },

    jsPDF: {
      unit: 'in',
      format: 'a4',
      orientation: 'landscape'
    },

    pagebreak: {
      mode: ['css', 'legacy']
    }
  };

  html2pdf().set(opt).from(card).save().then(() => {

    /* ---- RESTORE UI AFTER DOWNLOAD ---- */
    tableWrapper.style.overflowX = "";

    document.querySelectorAll("th, td").forEach(el => {
      el.style.position = "";
      el.style.fontSize = "";
      el.style.padding = "";
    });

    downloadSection.style.display = "flex";

    footerPage.remove();
  });
}
</script>
